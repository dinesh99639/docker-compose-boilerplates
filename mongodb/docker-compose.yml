name: ${PROJECT_NAME}

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    user: root
    labels:
      - "Project=${PROJECT_NAME}"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./volumes/mongo_data:/data/db
    # We fix permissions for the 'mongodb' user, then hand off control
    command: >
      sh -c "chown -R mongodb:mongodb /data/db && 
             exec gosu mongodb docker-entrypoint.sh mongod --bind_ip_all"